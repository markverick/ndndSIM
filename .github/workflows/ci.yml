name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ndnd/go.sum

      - name: Vet
        working-directory: ndnd
        env:
          CGO_ENABLED: '0'
        run: go vet ./sim/

      - name: Test (sim)
        working-directory: ndnd
        env:
          CGO_ENABLED: '0'
        run: go test ./sim/ -v -count=1

      - name: Test (fw, std)
        working-directory: ndnd
        env:
          CGO_ENABLED: '0'
        run: go test ./fw/... ./std/... -count=1
