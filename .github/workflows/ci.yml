name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests (${{ matrix.phase }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - phase: twophase
            ndnd_branch: dv2
          - phase: onephase
            ndnd_branch: main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Transform and test (${{ matrix.phase }})
        working-directory: go
        env:
          NDND_PHASE: ${{ matrix.phase }}
          NDND_GIT_URL: https://github.com/named-data/ndnd.git
          NDND_GIT_BRANCH: ${{ matrix.ndnd_branch }}
          NDND_TEST_ONLY: '1'
          CGO_ENABLED: '0'
        run: bash build.sh
